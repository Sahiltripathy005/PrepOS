name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.11.0'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: '9.12.2'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma Client
      run: pnpm --filter @placementos/api exec prisma generate

    - name: Lint
      run: pnpm run lint

    - name: Typecheck
      run: pnpm run typecheck

    - name: Build
      run: pnpm run build

    - name: Test
      run: pnpm run test
